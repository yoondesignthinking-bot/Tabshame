<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Find a tab · TabShame</title>
    <link rel="stylesheet" href="../lib/fonts.css" />
    <link rel="stylesheet" href="tabfinder.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-brand">
          <span class="topbar-mark">TAB SHAME</span>
          <span class="topbar-section">FIND A TAB</span>
        </div>
        <div class="topbar-stats" id="topbarStats">— tabs</div>
      </div>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7" />
            <line x1="21" y1="21" x2="16.5" y2="16.5" />
          </svg>
        </span>
        <input
          id="searchInput"
          class="search-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="Type to filter — title, URL, or domain. ↑↓ to move. Enter to switch. Esc to close."
        />
        <button class="search-clear" id="searchClear" hidden type="button" title="Clear">×</button>
      </div>

      <!-- Domain quick-filter chips. Generated by JS from the open tab set. -->
      <div class="filter-chips" id="filterChips"></div>
    </header>

    <main class="results" id="results">
      <!-- Tab tiles rendered here, grouped by domain. -->
    </main>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-emoji">🤷</div>
      <div class="empty-title">Nothing matches.</div>
      <div class="empty-sub">Try a different word, a domain, or part of the title.</div>
    </div>

    <footer class="footerbar">
      <span class="keyhint"><kbd>↑↓</kbd> navigate</span>
      <span class="keyhint"><kbd>Enter</kbd> switch</span>
      <span class="keyhint"><kbd>Esc</kbd> close</span>
      <span class="keyhint"><kbd>Cmd ⌫</kbd> close that tab</span>
      <span class="keyhint-spacer"></span>
      <span class="keyhint-meta">All matching happens locally · zero network</span>
    </footer>

    <script src="tabfinder.js"></script>
  </body>
</html>
