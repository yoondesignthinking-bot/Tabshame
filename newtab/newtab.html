<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab · TabShame</title>
    <link rel="stylesheet" href="../lib/fonts.css" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <!--
    Jun 2026 redesign:
      - Roast title becomes one line: emoji + archetype name. Tab count
        moves to the popup (the new-tab page is the "personality" surface,
        not the diagnosis surface).
      - Roast text is the centerpiece: large italic serif pull-quote with
        a peach left border.
      - 3 buttons, horizontal, tertiary-styled (outline only).
      - Recent-sites is the only opt-in shortcut row. Bookmark-bar CTA
        was removed (the new-tab page got too crowded with two parallel
        permission prompts).
      - Lite-mode toggle was removed too — too unclear. Users who want
        a shortcuts-first view set newTabMode in the popup Settings page.
      - Placeholders use a CSS skeleton pulse instead of literal "…" / "--".
  -->
  <body class="mode-full" aria-busy="true">
    <main class="stage" data-mode-full>
      <header class="topbar">
        <span class="brand">TAB SHAME</span>
        <span class="topbar-date" id="dateLabel"></span>
      </header>

      <div class="persona-column">
        <!-- Hero: one-line roast title (emoji + archetype name). -->
        <section class="hero">
          <h1 class="hero-name" id="heroName">
            <span class="hero-emoji" id="archetypeEmoji">🐌</span>
            <span class="hero-archetype" id="archetypeName">Diagnosing your tabs</span>
          </h1>
        </section>

        <!-- Pull-quote roast — the personality. -->
        <section class="roast-block">
          <blockquote class="roast-line" id="roastLine">
            <span class="skeleton-line skeleton-line-lg"></span>
            <span class="skeleton-line"></span>
            <span class="skeleton-line skeleton-line-sm"></span>
          </blockquote>
        </section>

        <!-- 3 horizontal tertiary buttons. -->
        <section class="actions">
          <button class="btn btn-tertiary" id="openReport">Open report</button>
          <button class="btn btn-tertiary" id="openTabFinder" title="Find a tab (Cmd+Shift+F)">
            Find a tab
          </button>
          <button class="btn btn-tertiary" id="closeDupes" disabled>
            <span id="closeDupesLabel">Close extras</span>
          </button>
        </section>
      </div>

      <!-- Single Recent-sites column. Bookmark-bar CTA removed Jun 2026. -->
      <div class="shortcuts-column">
        <div class="shortcuts-stack">
          <section class="shortcuts-section shortcuts-section-recent" data-shortcuts-section="recent">
            <section class="shortcuts-cta" data-shortcuts-cta="recent" hidden>
              <div class="shortcuts-cta-title">Show your recent sites here?</div>
              <div class="shortcuts-cta-actions">
                <button class="btn btn-primary" data-shortcuts-add="recent">
                  Show recent
                </button>
              </div>
            </section>

            <div class="shortcuts" data-shortcuts="recent" hidden>
              <div class="shortcuts-label">Recent</div>
              <div class="shortcuts-grid" data-shortcuts-grid="recent"></div>
              <div class="shortcuts-more-row" data-shortcuts-more-row="recent" hidden>
                <button class="mode-link" data-shortcuts-more="recent" type="button">
                  show more
                </button>
              </div>
              <div class="shortcuts-remove-row">
                <button class="mode-link" data-shortcuts-remove="recent" type="button">
                  remove
                </button>
              </div>
            </div>
          </section>
        </div>
      </div>

      <footer class="stage-footer">
        <span class="footer-meta">
          all processing happens locally · we never see your tabs
        </span>
      </footer>
    </main>

    <script src="../lib/storage.js"></script>
    <script src="../lib/domain-rules.js"></script>
    <script src="../lib/archetype-engine.js"></script>
    <script src="../lib/shame-engine.js"></script>
    <script src="newtab.js"></script>
  </body>
</html>
